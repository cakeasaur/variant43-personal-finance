name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Linux CI runs core tests/linters only (no GUI deps like Kivy/KivyMD).
          # Kivy requires a display and platform-specific SDL2/OpenGL libraries
          # that are not available on ubuntu-latest GitHub-hosted runners.
          # GUI smoke-test (python -m src.app --smoke) must be run locally or
          # on a self-hosted runner with a virtual framebuffer (Xvfb).
          # See docs/DEPLOYMENT.md for local GUI check instructions.
          python -m pip install -r requirements/ci.txt -r requirements/dev.txt

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Tests (pytest)
        run: python -m pytest -q

      - name: Dependency audit (pip-audit)
        run: python -m pip_audit -r requirements/ci.txt -r requirements/dev.txt

  # Future: add android_build job here once Buildozer + WSL2 setup is stable.


