name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CI uses requirements/ci.txt (no flet — headless environment).
          # Flet requires a display; all tests are pure domain/infra tests.
          python -m pip install -r requirements/ci.txt -r requirements/dev.txt

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Tests (pytest)
        run: python -m pytest -q

      - name: Dependency audit (pip-audit)
        run: python -m pip_audit -r requirements/ci.txt -r requirements/dev.txt

  # Future: add android_build job here once flet build android is configured.
