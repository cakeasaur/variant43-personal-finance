[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
  "E", "F",   # pycodestyle/pyflakes
  "I",        # isort
  "B",        # flake8-bugbear
  "UP",       # pyupgrade
]
ignore = [
  "E501", # line length handled by formatter/editor; keep lint noise low
]

[tool.pytest.ini_options]
testpaths = ["tests"]

